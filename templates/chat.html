<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthpedia AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #1c2128;
            --border: #30363d;
            --accent: #2dd4bf;
            --accent2: #0ea5e9;
            --user-bubble: #0ea5e9;
            --bot-bubble: #1c2128;
            --text: #e6edf3;
            --text-muted: #7d8590;
            --radius: 18px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Ambient background blobs */
        body::before {
            content: '';
            position: fixed;
            top: -200px; left: -200px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(45,212,191,0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -200px; right: -200px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(14,165,233,0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .chat-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 700px;
            height: 92vh;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        /* Header */
        .chat-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 24px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }

        .bot-avatar {
            width: 46px; height: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            position: relative;
        }

        .bot-avatar::after {
            content: '';
            position: absolute;
            bottom: 2px; right: 2px;
            width: 10px; height: 10px;
            background: #22c55e;
            border-radius: 50%;
            border: 2px solid var(--surface2);
        }

        .header-info h2 {
            font-family: 'Playfair Display', serif;
            font-size: 17px;
            color: var(--text);
            letter-spacing: 0.3px;
        }

        .header-info p {
            font-size: 12px;
            color: var(--accent);
            margin-top: 2px;
        }

        /* Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            animation: fadeUp 0.3s ease forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-row.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
        }

        .msg-avatar.bot {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
        }

        .msg-avatar.user {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
        }

        .msg-content {
            max-width: 72%;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .msg-row.user .msg-content { align-items: flex-end; }

        .bubble {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 14.5px;
            line-height: 1.6;
            color: var(--text);
            word-break: break-word;
        }

        .bubble.bot {
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .bubble.user {
            background: linear-gradient(135deg, var(--user-bubble), #0284c7);
            border-bottom-right-radius: 4px;
        }

        .msg-time {
            font-size: 11px;
            color: var(--text-muted);
            padding: 0 4px;
        }

        /* Thinking dots */
        .thinking {
            display: flex; gap: 5px; padding: 4px 2px;
        }
        .thinking span {
            width: 7px; height: 7px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.2s infinite ease-in-out;
        }
        .thinking span:nth-child(2) { animation-delay: 0.2s; }
        .thinking span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Input area */
        .chat-footer {
            padding: 16px 20px;
            background: var(--surface2);
            border-top: 1px solid var(--border);
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 8px 8px 8px 18px;
            transition: border-color 0.2s;
        }

        .input-row:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(45,212,191,0.1);
        }

        #text {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14.5px;
        }

        #text::placeholder { color: var(--text-muted); }

        #send {
            width: 38px; height: 38px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #0d1117;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            transition: transform 0.15s, opacity 0.15s;
            flex-shrink: 0;
        }

        #send:hover { transform: scale(1.08); }
        #send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>

<div class="chat-wrapper">
    <!-- Header -->
    <div class="chat-header">
        <div class="bot-avatar">🩺</div>
        <div class="header-info">
            <h2>Healthpedia AI</h2>
            <p>Medical Assistant • Online</p>
        </div>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="messageFormeight">
        <div class="msg-row">
            <div class="msg-avatar bot">🩺</div>
            <div class="msg-content">
                <div class="bubble bot">Hello! I'm your medical assistant. Ask me anything about health and medicine. 💊</div>
                <span class="msg-time">Now</span>
            </div>
        </div>
    </div>

    <!-- Input -->
    <div class="chat-footer">
        <form id="messageArea">
            <div class="input-row">
                <input type="text" id="text" name="msg" placeholder="Ask a medical question..." autocomplete="off" required />
                <button type="submit" id="send">➤</button>
            </div>
        </form>
    </div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
<script>
    $(document).ready(function () {
        function scrollToBottom() {
            const box = $("#messageFormeight");
            box.scrollTop(box[0].scrollHeight);
        }

        function formatTime(date) {
            return date.getHours() + ":" + String(date.getMinutes()).padStart(2, "0");
        }

        $("#messageArea").on("submit", async function (event) {
            event.preventDefault();

            const rawText = $("#text").val().trim();
            if (!rawText) return;

            const str_time = formatTime(new Date());
            $("#text").val("");
            $("#send").prop("disabled", true);

            // User message
            const userRow = $(`
                <div class="msg-row user">
                    <div class="msg-content">
                        <div class="bubble user"></div>
                        <span class="msg-time">${str_time}</span>
                    </div>
                    <div class="msg-avatar user">🧑</div>
                </div>
            `);
            userRow.find(".bubble.user").text(rawText);
            $("#messageFormeight").append(userRow);
            scrollToBottom();

            // Bot thinking
            const thinkingDots = $('<div class="thinking"><span></span><span></span><span></span></div>');
            const botBubble = $('<div class="bubble bot"></div>').append(thinkingDots);
            const botRow = $(`
                <div class="msg-row">
                    <div class="msg-avatar bot">🩺</div>
                    <div class="msg-content">
                        <span class="msg-time">${str_time}</span>
                    </div>
                </div>
            `);
            botRow.find(".msg-content").prepend(botBubble);
            $("#messageFormeight").append(botRow);
            scrollToBottom();

            try {
                const response = await fetch("/get", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: new URLSearchParams({ msg: rawText }),
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let answer = "";
                let firstChunk = true;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    if (firstChunk) {
                        botBubble.empty();
                        firstChunk = false;
                    }

                    answer += decoder.decode(value, { stream: true });
                    botBubble.text(answer.trimStart());
                    scrollToBottom();
                }
            } catch (error) {
                botBubble.empty().text("Sorry, I could not connect to the server.");
            } finally {
                $("#send").prop("disabled", false);
                $("#text").focus();
            }
        });
    });
</script>

</body>
</html>
